  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F7F6F1; --surface: #FFF; --border: #E2E0D8;
      --text-primary: #1A1A18; --text-secondary: #6B6A64; --text-muted: #9E9D97;
      --accent: #2A5FBF; --accent-light: #EBF0FA; --accent-hover: #1E4A99;
      --success: #1A7F4F; --success-light: #E8F5EE;
      --error: #C0392B; --warning: #A05A00; --warning-light: #FFF3E0;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
      --radius: 12px; --radius-sm: 8px;
    }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 48px 24px; }
    .container { width: 100%; max-width: 680px; }
    .header { margin-bottom: 32px; }
    .header-label { font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; }
    .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; }
    .header p { font-size: 14px; color: var(--text-secondary); line-height: 1.6; }

    .steps { display: flex; align-items: center; margin-bottom: 28px; }
    .step { display: flex; align-items: center; gap: 8px; }
    .step-num { width: 28px; height: 28px; border-radius: 50%; background: var(--border); color: var(--text-muted); font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.3s, color 0.3s; }
    .step.active .step-num { background: var(--accent); color: #fff; }
    .step.done   .step-num { background: var(--success); color: #fff; }
    .step-label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
    .step.active .step-label { color: var(--accent); }
    .step.done   .step-label { color: var(--success); }
    .step-line { flex: 1; height: 1px; background: var(--border); margin: 0 10px; }

    .card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 14px; }
    .card-header { padding: 14px 20px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    .card-badge { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
    .badge-csv    { background: #FFF3E0; color: #A05A00; }
    .badge-learn  { background: #E8F0FF; color: #2A5FBF; }
    .card-title { font-size: 14px; font-weight: 700; }
    .card-desc { font-size: 12px; color: var(--text-secondary); margin-left: auto; }

    .drop-zone { padding: 28px 24px; text-align: center; cursor: pointer; transition: background 0.2s; border: 2px dashed var(--border); border-radius: 0 0 var(--radius) var(--radius); position: relative; }
    .drop-zone.has-file { border-style: solid; border-color: transparent; background: var(--bg); padding: 16px 20px; cursor: default; text-align: left; }
    .drop-zone.drag-over { background: var(--accent-light); border-color: var(--accent); }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .drop-zone.has-file input[type="file"] { display: none; }
    .drop-placeholder { pointer-events: none; }
    .drop-icon-wrap { width: 44px; height: 44px; margin: 0 auto 12px; background: var(--accent-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .drop-icon-wrap svg { width: 22px; height: 22px; stroke: var(--accent); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .drop-text { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .drop-sub { font-size: 12px; color: var(--text-secondary); }

    .file-selected { display: flex; align-items: center; gap: 12px; }
    .file-ext-badge { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; padding: 4px 8px; border-radius: 6px; flex-shrink: 0; }
    .ext-csv  { background: #FFF3E0; color: #A05A00; }
    .ext-xlsx, .ext-xls { background: #E8F5EE; color: #1A7F4F; }
    .file-info { flex: 1; min-width: 0; }
    .file-info-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-info-size { font-size: 11px; color: var(--text-muted); font-family: 'Space Mono', monospace; }
    .file-check { width: 22px; height: 22px; background: var(--success-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .file-check svg { width: 12px; height: 12px; stroke: var(--success); fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    .change-btn { font-size: 11px; color: var(--text-muted); background: none; border: 1px solid var(--border); border-radius: 4px; padding: 4px 10px; cursor: pointer; flex-shrink: 0; transition: color 0.15s, border-color 0.15s; }
    .change-btn:hover { color: var(--accent); border-color: var(--accent); }

    .run-area { padding: 20px 0 4px; }
    .btn-run { width: 100%; height: 48px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-family: 'Noto Sans JP', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.15s, transform 0.1s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-run:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-run:active:not(:disabled) { transform: scale(0.99); }
    .btn-run:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
    .btn-run svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-run.loading .btn-label { display: none; }
    .btn-run .spinner { display: none; }
    .btn-run.loading .spinner { display: block; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .log-area { display: none; margin-top: 16px; }
    .log-area.visible { display: block; }
    .log-box { background: #1A1A18; border-radius: var(--radius-sm); padding: 14px 16px; font-family: 'Space Mono', monospace; font-size: 12px; line-height: 1.9; color: #C8C7C0; max-height: 220px; overflow-y: auto; }
    .log-line { animation: fadeIn 0.2s ease; }
    .log-ok  { color: #5DBF8A; }
    .log-warn{ color: #F5C842; }
    .log-err { color: #F08080; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .result-banner { display: none; margin-top: 16px; background: var(--success-light); border: 1px solid #A8D8BB; border-radius: var(--radius-sm); padding: 16px 20px; }
    .result-banner.visible { display: flex; align-items: center; gap: 14px; }
    .result-banner svg { width: 20px; height: 20px; stroke: var(--success); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
    .result-text { flex: 1; font-size: 13px; color: var(--success); font-weight: 500; }
    .result-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 400; }
    .btn-download { font-size: 13px; font-weight: 700; background: var(--success); color: #fff; border: none; border-radius: 6px; padding: 8px 18px; cursor: pointer; transition: opacity 0.15s; flex-shrink: 0; }
    .btn-download:hover { opacity: 0.88; }

    .toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--text-primary); color: #fff; font-size: 13px; padding: 10px 20px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); opacity: 0; transition: transform 0.3s, opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 1000; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error   { background: var(--error); }
    .toast.warning { background: var(--warning); }
    .toast.success { background: var(--success); }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">Cost Category Tool</div>
    <h1>費用区分追加ツール</h1>
    <p>購買実績CSV（Shift-JIS）と学習データ（Excel）をアップロードして、費用区分を付加したExcelを出力します。</p>
  </div>

  <div class="steps">
    <div class="step active" id="step1"><div class="step-num">1</div><div class="step-label">ファイル選択</div></div>
    <div class="step-line"></div>
    <div class="step" id="step2"><div class="step-num">2</div><div class="step-label">処理実行</div></div>
    <div class="step-line"></div>
    <div class="step" id="step3"><div class="step-num">3</div><div class="step-label">ダウンロード</div></div>
  </div>

  <!-- 購買実績CSV -->
  <div class="card">
    <div class="card-header">
      <span class="card-badge badge-csv">購買実績</span>
      <span class="card-title">購買実績データ</span>
      <span class="card-desc">.csv（Shift-JIS）</span>
    </div>
    <div class="drop-zone" id="dropCsv">
      <input type="file" id="inputCsv" accept=".csv">
      <div class="drop-placeholder" id="placeholderCsv">
        <div class="drop-icon-wrap"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <div class="drop-text">ここにドロップ、またはクリックして選択</div>
        <div class="drop-sub">SHD〜.csv などの購買実績ファイル</div>
      </div>
      <div class="file-selected" id="selectedCsv" style="display:none;">
        <div class="file-ext-badge ext-csv">CSV</div>
        <div class="file-info"><div class="file-info-name" id="nameCsv"></div><div class="file-info-size" id="sizeCsv"></div></div>
        <div class="file-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <button class="change-btn" onclick="resetFile('Csv')">変更</button>
      </div>
    </div>
  </div>

  <!-- 学習データ -->
  <div class="card">
    <div class="card-header">
      <span class="card-badge badge-learn">学習データ</span>
      <span class="card-title">費用区分マスタ（学習済みデータ）</span>
      <span class="card-desc">.xlsx / .xls</span>
    </div>
    <div class="drop-zone" id="dropLearn">
      <input type="file" id="inputLearn" accept=".xlsx,.xls">
      <div class="drop-placeholder" id="placeholderLearn">
        <div class="drop-icon-wrap"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
        <div class="drop-text">ここにドロップ、またはクリックして選択</div>
        <div class="drop-sub">費用区分の基準となるマスタデータ（Excel）</div>
      </div>
      <div class="file-selected" id="selectedLearn" style="display:none;">
        <div class="file-ext-badge ext-xlsx" id="extLearn">XLSX</div>
        <div class="file-info"><div class="file-info-name" id="nameLearn"></div><div class="file-info-size" id="sizeLearn"></div></div>
        <div class="file-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <button class="change-btn" onclick="resetFile('Learn')">変更</button>
      </div>
    </div>
  </div>

  <div class="run-area">
    <button class="btn-run" id="runBtn" disabled onclick="handleRun()">
      <div class="spinner"></div>
      <span class="btn-label" style="display:flex;align-items:center;gap:8px;">
        <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        費用区分を追加して出力する
      </span>
    </button>
  </div>

  <div class="log-area" id="logArea"><div class="log-box" id="logBox"></div></div>

  <div class="result-banner" id="resultBanner">
    <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    <div class="result-text">処理が完了しました<div class="result-sub" id="resultSub"></div></div>
    <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
      <button class="btn-download" id="dlBtn">① 加工済購買実績</button>
      <button class="btn-download" id="dlLearnBtn" style="background:#2A5FBF;">② 更新済み学習データ</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  var csvFile = null, learnFile = null, outputBlob = null, outputFilename = '', learnBlob = null, learnFilename = '';

  // ドロップゾーン設定
  function setupDrop(suffix, accept) {
    var zone  = document.getElementById('drop'  + suffix);
    var input = document.getElementById('input' + suffix);
    zone.addEventListener('dragover',  function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', function(e) { if (!zone.contains(e.relatedTarget)) zone.classList.remove('drag-over'); });
    zone.addEventListener('drop', function(e) { e.preventDefault(); zone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) setFile(suffix, e.dataTransfer.files[0]); });
    input.addEventListener('change', function() { if (input.files[0]) setFile(suffix, input.files[0]); input.value = ''; });
  }
  setupDrop('Csv',   '.csv');
  setupDrop('Learn', '.xlsx,.xls');

  function getExt(name) { return name.split('.').pop().toLowerCase(); }
  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function setFile(suffix, f) {
    var ext = getExt(f.name);
    if (suffix === 'Csv'   && ext !== 'csv')                  { showToast('CSVファイルを選択してください', 'warning'); return; }
    if (suffix === 'Learn' && !['xlsx','xls'].includes(ext))  { showToast('Excelファイルを選択してください', 'warning'); return; }
    if (suffix === 'Csv') csvFile = f; else learnFile = f;
    document.getElementById('placeholder' + suffix).style.display = 'none';
    document.getElementById('selected'    + suffix).style.display = 'flex';
    document.getElementById('name'        + suffix).textContent = f.name;
    document.getElementById('size'        + suffix).textContent = formatSize(f.size);
    if (suffix === 'Learn') document.getElementById('extLearn').textContent = ext.toUpperCase();
    document.getElementById('drop' + suffix).classList.add('has-file');
    updateBtn();
  }

  function resetFile(suffix) {
    if (suffix === 'Csv') csvFile = null; else learnFile = null;
    document.getElementById('placeholder' + suffix).style.display = '';
    document.getElementById('selected'    + suffix).style.display = 'none';
    document.getElementById('drop'        + suffix).classList.remove('has-file');
    updateBtn();
  }

  function updateBtn() {
    document.getElementById('runBtn').disabled = !(csvFile && learnFile);
  }

  // CSVをShift-JISでパース（PapaParse）
  function parseCsvShiftJis(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          // Shift-JISのArrayBufferをUTF-8文字列にデコード
          var decoder = new TextDecoder('shift-jis', { fatal: false });
          var text    = decoder.decode(new Uint8Array(e.target.result));
          var result  = Papa.parse(text, { header: false, skipEmptyLines: false });
          resolve(result.data);
        } catch(err) { reject(err); }
      };
      reader.onerror = function() { reject(new Error('CSV読み込み失敗')); };
      reader.readAsArrayBuffer(file);
    });
  }

  // ExcelをSheetJSで読み込む
  function readExcel(file) {
    return new Promise(function(resolve, reject) {
      var reader = new FileReader();
      reader.onload = function(e) {
        try {
          var wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array', cellDates: false });
          var ws = wb.Sheets[wb.SheetNames[0]];
          resolve(XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' }));
        } catch(err) { reject(err); }
      };
      reader.onerror = function() { reject(new Error('Excel読み込み失敗')); };
      reader.readAsArrayBuffer(file);
    });
  }

  function handleRun() {
    if (!csvFile || !learnFile) return;
    var btn = document.getElementById('runBtn');
    btn.classList.add('loading'); btn.disabled = true;
    document.getElementById('logArea').classList.add('visible');
    document.getElementById('resultBanner').classList.remove('visible');
    document.getElementById('logBox').innerHTML = '';
    outputBlob = null; learnBlob = null;
    setStepUI(2);
    addLog('📂 ファイルを読み込んでいます...');

    Promise.all([parseCsvShiftJis(csvFile), readExcel(learnFile)])
      .then(function(results) {
        var csvRows   = results[0];  // CSVの全行（2次元配列、ヘッダー含む）
        var learnRows = results[1];  // 学習データ

        addLog('  購買実績CSV: ' + (csvRows.length - 1) + '行');
        addLog('  学習データ: '  + (learnRows.length - 1) + '行');

        // ---- 学習データから辞書を構築 ----
        // KEY = N列(index13:部署コード) + BC列(index54:お申込番号) → BD列(index55:費用区分)
        addLog('🔑 費用区分マスタを構築中...');
        var learnDict = {};
        for (var i = 1; i < learnRows.length; i++) {
          var r   = learnRows[i];
          var key = String(r[13] || '').trim() + '|' + String(r[54] || '').trim();
          learnDict[key] = String(r[55] || '').trim();
        }
        addLog('  → ' + Object.keys(learnDict).length + ' 件のKEYを読み込みました');

        // ---- CSVに費用区分列を挿入（56列目=index55に挿入）----
        addLog('🔧 費用区分を付加中...');
        var INSERT_COL = 55; // 0-indexed（56列目の前 = index55に挿入）
        var matched = 0, unmatched = 0;

        // ヘッダー行に「費用区分」を挿入
        var header = csvRows[0].slice();
        header.splice(INSERT_COL, 0, '費用区分');

        var dataRows = [];
        for (var r = 1; r < csvRows.length; r++) {
          var row = csvRows[r].slice();
          // 空行スキップ
          if (row.length === 0 || (row.length === 1 && row[0] === '')) {
            row.splice(INSERT_COL, 0, '');
            dataRows.push({ values: row, costValue: '', isEmpty: true });
            continue;
          }
          var key       = String(row[13] || '').trim() + '|' + String(row[54] || '').trim();
          var costValue = learnDict[key] !== undefined ? learnDict[key] : '';
          row.splice(INSERT_COL, 0, costValue);
          if (costValue) matched++; else unmatched++;
          dataRows.push({ values: row, costValue: costValue, isEmpty: false });
        }
        addLog('  → 費用区分あり: ' + matched + '件（黄色）、未一致: ' + unmatched + '件（水色）');

        // ---- Excelワークブックを生成 ----
        addLog('📊 Excelファイルを生成中...');
        var wb  = XLSX.utils.book_new();
        var aoa = [header];
        dataRows.forEach(function(d) { aoa.push(d.values); });
        var ws  = XLSX.utils.aoa_to_sheet(aoa, { dense: false });

        // 数値列の書式設定
        // 挿入後: 60列目(index59)=単価(税抜), 61列目(index60)=明細計(税抜), 104列目(index103)=税率
        var numFmtInt     = '0';
        var numFmtDecimal = '#,##0.00';
        var numIntCols    = [59, 60];   // 0-indexed
        var numDecCol     = 103;        // 0-indexed

        for (var rowIdx = 1; rowIdx < aoa.length; rowIdx++) {
          numIntCols.forEach(function(colIdx) {
            var addr = XLSX.utils.encode_cell({ r: rowIdx, c: colIdx });
            var val  = aoa[rowIdx][colIdx];
            var num  = parseFloat(String(val).replace(/,/g, ''));
            if (!isNaN(num)) {
              ws[addr] = { t: 'n', v: num, z: numFmtInt };
            }
          });
          var decAddr = XLSX.utils.encode_cell({ r: rowIdx, c: numDecCol });
          var decVal  = aoa[rowIdx][numDecCol];
          var decNum  = parseFloat(String(decVal).replace(/,/g, ''));
          if (!isNaN(decNum)) {
            ws[decAddr] = { t: 'n', v: decNum, z: numFmtDecimal };
          }
        }

        // 列の表示/非表示設定
        var SHOW_COLS = [3, 15, 56, 57, 60, 61, 104];
        var totalCols = header.length;
        if (!ws['!cols']) ws['!cols'] = [];
        for (var c = 0; c < totalCols; c++) {
          var colNum = c + 1;
          ws['!cols'][c] = SHOW_COLS.indexOf(colNum) === -1
            ? { hidden: true }
            : { wch: getColWidth(colNum) };
        }

        XLSX.utils.book_append_sheet(wb, ws, '購買実績');

        // SheetJSでベースxlsxを生成（スタイルなし）
        var xlsxArr = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

        // fflateでZIPを直接操作してスタイルを注入（CDN不要・GAS対応）
        addLog('🎨 スタイルを適用中...');
        try {
          var u8arr    = new Uint8Array(xlsxArr);
          var unzipped = fflate.unzipSync(u8arr);

          // styles.xml を書き換え
          var stylesXml = new TextDecoder().decode(unzipped['xl/styles.xml']);

          // fillId=2: lightTrellis黄色網掛け（費用区分あり）
          // fillId=3: solid水色（費用区分なし）
          var newFills = '<fills count="4">'
            + '<fill><patternFill patternType="none"/></fill>'
            + '<fill><patternFill patternType="gray125"/></fill>'
            + '<fill><patternFill patternType="lightTrellis"><fgColor rgb="FFFFFF00"/><bgColor rgb="FFFFFFFF"/></patternFill></fill>'
            + '<fill><patternFill patternType="solid"><fgColor rgb="FFADD8E6"/></patternFill></fill>'
            + '</fills>';
          stylesXml = stylesXml.replace(/<fills count="2">[\s\S]*?<\/fills>/, newFills);

          // 追加前のcellXfs数を取得してインデックスを計算
          var xfMatch       = stylesXml.match(/<cellXfs count="(\d+)">/);
          var beforeXfCount = xfMatch ? parseInt(xfMatch[1]) : 1;
          var yellowXfIdx   = beforeXfCount;
          var blueXfIdx     = beforeXfCount + 1;

          stylesXml = stylesXml.replace(
            /(<cellXfs count=")(\d+)(">)([\s\S]*?)(<\/cellXfs>)/,
            function(m, p1, cnt, p3, inner, p5) {
              return p1 + (parseInt(cnt) + 2) + p3 + inner
                + '<xf numFmtId="0" fontId="0" fillId="2" borderId="0" xfId="0" applyFill="1"/>'
                + '<xf numFmtId="0" fontId="0" fillId="3" borderId="0" xfId="0" applyFill="1"/>'
                + p5;
            }
          );
          unzipped['xl/styles.xml'] = new TextEncoder().encode(stylesXml);

          // sheet1.xml のBD列にs属性を付与
          var sheetXml  = new TextDecoder().decode(unzipped['xl/worksheets/sheet1.xml']);
          var colLetter = colIndexToLetter(INSERT_COL);
          for (var rowIdx = 1; rowIdx <= dataRows.length; rowIdx++) {
            var d = dataRows[rowIdx - 1];
            if (d.isEmpty) continue;
            var cellRef = colLetter + (rowIdx + 1);
            var sVal    = d.costValue ? String(yellowXfIdx) : String(blueXfIdx);
            sheetXml = sheetXml.replace(
              new RegExp('(<c r="' + cellRef + '")([^>]*)(>|\/>)'),
              function(m, p1, attrs, end) {
                return p1 + attrs.replace(/\s+s="[^"]*"/, '') + ' s="' + sVal + '"' + end;
              }
            );
          }
          unzipped['xl/worksheets/sheet1.xml'] = new TextEncoder().encode(sheetXml);

          // 再圧縮してBlobに変換
          var zipped = fflate.zipSync(unzipped, { level: 6 });
          outputBlob = new Blob([zipped], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
          outputFilename = '加工済購買実績_' + formatDate() + '.xlsx';

          // ---- 学習データに水色行（未一致）を追記 ----
          // CSVの水色行をlearnRowsに追記（154列に変換して末尾に追加）
          // CSV列マッピング: CSV[0..54] + [''] + CSV[55..152] = 154列
          var newLearnRows = [];
          for (var li = 0; li < dataRows.length; li++) {
            var ld = dataRows[li];
            if (ld.isEmpty || ld.costValue) continue; // 空行・費用区分ありはスキップ
            var origRow = csvRows[li + 1]; // dataRowsはcsv[1]から対応
            var learnRow = origRow.slice(0, 55)     // CSV[0..54]
              .concat([''])                          // 費用区分（空欄）
              .concat(origRow.slice(55));            // CSV[55..152]
            newLearnRows.push(learnRow);
          }
          addLog('📚 学習データに ' + newLearnRows.length + ' 件追記します...');

          // 学習データExcelを読み込んでfflateで末尾に追記
          readExcel(learnFile).then(function(learnRows) {
            var learnWb  = XLSX.utils.book_new();
            var allRows  = learnRows.concat(newLearnRows);
            var learnWs  = XLSX.utils.aoa_to_sheet(allRows);
            XLSX.utils.book_append_sheet(learnWb, learnWs, '購買実績');
            var learnArr = XLSX.write(learnWb, { bookType: 'xlsx', type: 'array' });

            // fflateで追記行（newLearnRows）のBD列（index55）に水色網掛けを適用
            try {
              var lu8      = new Uint8Array(learnArr);
              var lunzip   = fflate.unzipSync(lu8);
              var lstyles  = new TextDecoder().decode(lunzip['xl/styles.xml']);

              // fillsに水色solidを追加（fillId=2）
              var lnewFills = '<fills count="3">'
                + '<fill><patternFill patternType="none"/></fill>'
                + '<fill><patternFill patternType="gray125"/></fill>'
                + '<fill><patternFill patternType="solid"><fgColor rgb="FFADD8E6"/></patternFill></fill>'
                + '</fills>';
              lstyles = lstyles.replace(/<fills count="2">[\s\S]*?<\/fills>/, lnewFills);

              // 追加前のcellXfs数を取得
              var lxfMatch  = lstyles.match(/<cellXfs count="(\d+)">/);
              var lBeforeCnt = lxfMatch ? parseInt(lxfMatch[1]) : 1;
              var blueIdx   = lBeforeCnt; // 追加後のxfIndex

              lstyles = lstyles.replace(
                /(<cellXfs count=")(\d+)(">)([\s\S]*?)(<\/cellXfs>)/,
                function(m, p1, cnt, p3, inner, p5) {
                  return p1 + (parseInt(cnt) + 1) + p3 + inner
                    + '<xf numFmtId="0" fontId="0" fillId="2" borderId="0" xfId="0" applyFill="1"/>'
                    + p5;
                }
              );
              lunzip['xl/styles.xml'] = new TextEncoder().encode(lstyles);

              // sheet1.xmlの追記行のBD列（col=55, 0-indexed）に水色を適用
              var lsheet = new TextDecoder().decode(lunzip['xl/worksheets/sheet1.xml']);
              var existRows = learnRows.length; // 元の行数（ヘッダー含む）
              for (var ni = 0; ni < newLearnRows.length; ni++) {
                var sheetRowNum = existRows + ni + 1; // スプレッドシートの行番号(1-indexed)
                var cellRef     = 'BD' + sheetRowNum;
                lsheet = lsheet.replace(
                  new RegExp('(<c r="' + cellRef + '")([^>]*)(>|\/>)'),
                  function(m, p1, attrs, end) {
                    return p1 + attrs.replace(/\s+s="[^"]*"/, '') + ' s="' + blueIdx + '"' + end;
                  }
                );
              }
              lunzip['xl/worksheets/sheet1.xml'] = new TextEncoder().encode(lsheet);

              var lzipped = fflate.zipSync(lunzip, { level: 6 });
              learnBlob = new Blob([lzipped], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            } catch(le) {
              // スタイル適用失敗時はスタイルなしで出力
              learnBlob = new Blob([learnArr], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            }
            learnFilename = '学習データ_更新_' + formatDate() + '.xlsx';
            addLog('📚 学習データ更新完了: ' + newLearnRows.length + '件追記 (' + learnFilename + ')');
          }).catch(function(e) {
            addLog('⚠️ 学習データ更新エラー: ' + e.message, 'warn');
          });
          addLog('✨ 完了！ファイル名: ' + outputFilename);
          var matchRate = (csvRows.length - 1) > 0
            ? (matched / (csvRows.length - 1) * 100).toFixed(1) : '0.0';
          document.getElementById('resultSub').textContent =
            '費用区分あり ' + matched + '件　未一致 ' + unmatched + '件（一致率 ' + matchRate + '%）';
          document.getElementById('resultBanner').classList.add('visible');
          setStepUI(3);
          showToast('処理完了！', 'success');
          btn.classList.remove('loading'); btn.disabled = false;
        } catch(err) {
          addLog('❌ スタイルエラー: ' + err.message, 'err');
          showToast('エラーが発生しました', 'error');
          btn.classList.remove('loading'); btn.disabled = false;
        }
      })
      .catch(function(err) {
        addLog('❌ エラー: ' + err.message, 'err');
        showToast('エラーが発生しました', 'error');
        btn.classList.remove('loading'); btn.disabled = false;
      });
  }

  // 列インデックス(0-indexed)を列文字(A,B,...,BD...)に変換
  function colIndexToLetter(idx) {
    var letter = '';
    idx = idx + 1; // 1-indexedに変換
    while (idx > 0) {
      var mod = (idx - 1) % 26;
      letter = String.fromCharCode(65 + mod) + letter;
      idx = Math.floor((idx - mod) / 26);
    }
    return letter;
  }

  // 列幅設定（1-indexed）
  function getColWidth(colNum) {
    var widths = { 3: 11, 15: 21, 56: 11, 57: 60, 60: 11, 61: 11, 104: 11 };
    return widths[colNum] || 10;
  }

  // ダウンロード共通関数
  function downloadBlob(blob, filename) {
    if (!blob) { alert(filename + ' はまだ生成されていません'); return; }
    var url = URL.createObjectURL(blob);
    var a   = document.createElement('a');
    a.href  = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  // ① 加工済購買実績ダウンロード
  document.getElementById('dlBtn').addEventListener('click', function() {
    downloadBlob(outputBlob, outputFilename);
  });

  // ② 更新済み学習データダウンロード
  document.getElementById('dlLearnBtn').addEventListener('click', function() {
    downloadBlob(learnBlob, learnFilename);
  });

  function formatDate() {
    var now = new Date(), p = function(n) { return n < 10 ? '0' + n : String(n); };
    return now.getFullYear() + p(now.getMonth()+1) + p(now.getDate())
         + '_' + p(now.getHours()) + p(now.getMinutes()) + p(now.getSeconds());
  }
  function addLog(msg, type) {
    var box = document.getElementById('logBox');
    var d = document.createElement('div');
    d.className = 'log-line' + (type ? ' log-' + type : '');
    d.textContent = msg; box.appendChild(d); box.scrollTop = box.scrollHeight;
  }
  function setStepUI(n) {
    [1,2,3].forEach(function(i) {
      var el = document.getElementById('step' + i);
      el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    });
  }
  function showToast(msg, type) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast show' + (type ? ' ' + type : '');
    setTimeout(function() { t.className = 'toast'; }, 2800);
  }
</script>
</body>
